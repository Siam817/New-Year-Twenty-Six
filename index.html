<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy New Year 🎉</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
html, body {
  margin:0; padding:0; width:100%; height:100%;
  font-family:'Poppins',sans-serif;
  background: linear-gradient(135deg,#020024,#090979,#00d4ff);
  overflow:hidden;
  display:flex; justify-content:center; align-items:center;
  color:#fff;
}
canvas {
  position:absolute; top:0; left:0; display:block; z-index:0;
}
.card {
  position:relative; z-index:1;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(10px);
  border-radius:20px;
  padding:30px;
  max-width:420px; width:90%;
  text-align:center;
  box-shadow:0 20px 40px rgba(0,0,0,0.3);
  animation:fadeIn 1.5s ease;
}
@keyframes fadeIn{
  from{opacity:0;transform:translateY(30px)}
  to{opacity:1;transform:translateY(0)}
}
h1 { font-size:2.2rem; margin-bottom:10px; }
h1 span { color:#ffd700; }
p { font-size:1rem; margin-bottom:20px; line-height:1.6; }

.wish {
  position:relative;
  bottom:-50px; 
  font-size:1.1rem; 
  color:#ffd700;
  opacity:0;
  animation:riseUp 3s ease forwards;
}
@keyframes riseUp {
  0% { bottom:-50px; opacity:0; }
  100% { bottom:0; opacity:1; }
}

footer { margin-top:25px; font-size:0.8rem; opacity:0.8; color:#fff; }
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="card">
  <h1>🎆 Happy <span>New Year</span> 2026 🎆</h1>
  <p>New year, new hope, new dreams ✨</p>
  <div class="wish" id="wish"></div>
  <footer>Made with ❤️ by Mohammad Ullah Siam</footer>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
window.addEventListener("resize", resize);

let fireworks=[], particles=[];

class Firework {
  constructor(){
    this.x = canvas.width*0.25 + Math.random()*canvas.width*0.5;
    this.y = canvas.height;
    this.ty = canvas.height*0.15;
    this.speed = 4 + Math.random()*2;
    this.vy = -this.speed;
    this.color = `hsl(${Math.random()*360},100%,60%)`;
    this.exploded = false;
    this.size = 2;
  }
  update(){
    if(!this.exploded){
      this.y += this.vy;
      if(this.y <= this.ty) this.explode();
    }
  }
  explode(){
    for(let i=0;i<80;i++) particles.push(new Particle(this.x,this.y,this.color));
    this.exploded = true;
  }
  draw(){
    if(!this.exploded){
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
      ctx.fill();
    }
  }
}

class Particle {
  constructor(x,y,color){
    this.x=x; this.y=y;
    this.speed = Math.random()*3 + 2; 
    this.angle = Math.random()*Math.PI*2;
    this.vx = Math.cos(this.angle)*this.speed;
    this.vy = Math.sin(this.angle)*this.speed;
    this.gravity = 0.02;
    this.life = 60 + Math.random()*20;
    this.color = color;
    this.size = 0.5 + Math.random()*0.3; 
  }
  update(){
    this.vy += this.gravity;
    this.x += this.vx; 
    this.y += this.vy;
    this.life--; 
    this.size *= 1.02;
  }
  draw(){
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fill();
  }
}

function animate(){
  ctx.fillStyle="rgba(0,0,0,0.1)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  fireworks.forEach(f=>{f.update(); f.draw();});
  particles.forEach((p,i)=>{
    p.update(); p.draw();
    if(p.life<=0) particles.splice(i,1);
  });

  requestAnimationFrame(animate);
}

// প্রতি ২ সেকেন্ডে ১টা
setInterval(() => fireworks.push(new Firework()), 2000);

// প্রতি ১০ সেকেন্ডে ১০টা
setInterval(() => {
  for(let i=0; i<10; i++){
    fireworks.push(new Firework());
  }
}, 10000);

animate();

// Auto wish
setTimeout(() => {
  document.getElementById('wish').innerHTML =
  `Happy New Year! 🎊<br>May the new year bring you happiness, peace, and success 🌟`;
}, 3000);
</script>

</body>
</html>
